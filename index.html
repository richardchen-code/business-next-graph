<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Next Graph — 數位時代互動視覺配件</title>
<style>
  :root {
    --bn-orange: #FF6B1A;
    --bn-black: #1A1A1A;
    --bn-paper: #FAF7F1;
    --bn-gray: #707070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bn-paper);
    color: var(--bn-black);
    line-height: 1.6;
    padding: 48px 24px;
  }
  .container { max-width: 1080px; margin: 0 auto; }
  header { border-left: 4px solid var(--bn-orange); padding-left: 16px; margin-bottom: 48px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .lede { color: var(--bn-gray); font-size: 15px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card {
    background: #fff;
    border: 1px solid #E5E2DC;
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--bn-orange); }
  .card a { color: var(--bn-black); text-decoration: none; display: block; }
  .card .date { color: var(--bn-gray); font-size: 12px; margin-bottom: 6px; }
  .card .title { font-size: 16px; font-weight: 600; }
  .empty { color: var(--bn-gray); font-style: italic; padding: 24px; border: 1px dashed #ccc; border-radius: 8px; text-align: center; }
  footer { margin-top: 64px; color: var(--bn-gray); font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Business Next Graph</h1>
    <p class="lede">《數位時代》互動視覺配件托管庫</p>
  </header>
  <div class="grid">
    <div class="empty">尚未有配件，建立第一個 HTML 配件後將自動列在此處。</div>
  </div>
  <footer>由 visual-asset Skill 維護｜<a href="https://github.com/richardchen-code/business-next-graph" style="color: var(--bn-gray);">GitHub Repo</a></footer>
</div>
</body>
</html>
